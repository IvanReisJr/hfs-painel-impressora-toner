<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HFS - Painel de Toner{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .navbar { background: #1a1a2e !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .toner-bar { height: 20px; border-radius: 4px; transition: width .4s ease; }
    .badge-critical { background: #dc3545; }
    .badge-warning  { background: #ffc107; color: #000; }
    .badge-ok       { background: #198754; }
    .badge-unknown  { background: #6c757d; }
    .stat-card { border-left: 4px solid; border-radius: 8px; }
    .stat-critical { border-color: #dc3545; }
    .stat-warning  { border-color: #ffc107; }
    .stat-ok       { border-color: #198754; }
    .stat-nodata   { border-color: #6c757d; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-dark navbar-expand-lg mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{% url 'printers:dashboard' %}">
      <i class="bi bi-printer-fill me-2"></i>HFS Toner Dashboard
    </a>
    <span class="text-white-50 small">v1.0</span>
  </div>
</nav>
<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
