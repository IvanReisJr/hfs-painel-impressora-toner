<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Coleta Toner HFS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .status-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .status-indicator {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .status-text {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .status-detail {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }
        .ok {
            color: #28a745;
        }
        .fail {
            color: #dc3545;
        }
        .progress {
            margin-top: 20px;
        }
        .progress-bar {
            background: #e9ecef;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: #28a745;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            gap: 15px;
        }
        .stat {
            flex: 1;
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-transform: uppercase;
        }
        .error-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            text-align: left;
            font-size: 13px;
        }
        .refresh-info {
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖨️ Painel Toner HFS</h1>
        <p class="subtitle">Status da Coleta Automática</p>

        <div class="status-box" id="statusBox">
            <div class="status-indicator"><span class="loading"></span></div>
            <div class="status-text">Carregando...</div>
            <div class="status-detail">Verificando status da última coleta</div>
        </div>

        <div class="refresh-info">
            🔄 Atualiza a cada 10 segundos
        </div>
    </div>

    <script>
        const STATUS_FILE = 'coleta_status.json';
        const STATUS_MESSAGES = {
            'sucesso': '✅ Sucesso',
            'em_progresso': '⏳ Em Progresso',
            'erro': '❌ Erro na Coleta',
            'erro_excel': '⚠️ Erro ao Gerar Excel',
        };

        function loadStatus() {
            fetch(STATUS_FILE + '?t=' + Date.now())
                .then(r => r.json())
                .then(data => renderStatus(data))
                .catch(e => renderError('Arquivo de status não encontrado. Execute: python coletar.py --exportar'));
        }

        function renderStatus(data) {
            const box = document.getElementById('statusBox');
            const timestamp = new Date(data.timestamp);
            const ago = getTimeAgo(timestamp);

            let statusMsg = STATUS_MESSAGES[data.status] || '❓ Desconhecido';
            let borderColor = '#667eea';

            if (data.status === 'sucesso') {
                borderColor = '#28a745';
            } else if (data.status.includes('erro')) {
                borderColor = '#dc3545';
            }

            let html = `
                <div class="status-indicator">${statusMsg.split(' ')[0]}</div>
                <div class="status-text">${statusMsg.split(' ').slice(1).join(' ')}</div>
                <div class="status-detail">${timestamp.toLocaleString('pt-BR')}</div>
                <div class="status-detail" style="color: #999; font-size: 12px;">há ${ago}</div>
            `;

            if (data.total > 0) {
                const percent = Math.round((data.ok / data.total) * 100);
                html += `
                    <div class="progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percent}%"></div>
                        </div>
                    </div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-number ok">${data.ok}</div>
                            <div class="stat-label">OK</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number fail">${data.fail}</div>
                            <div class="stat-label">Falhas</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${data.total}</div>
                            <div class="stat-label">Total</div>
                        </div>
                    </div>
                `;
            }

            if (data.error) {
                html += `<div class="error-box"><strong>Erro:</strong> ${data.error}</div>`;
            }

            box.innerHTML = html;
            box.style.borderLeftColor = borderColor;
        }

        function renderError(msg) {
            document.getElementById('statusBox').innerHTML = `
                <div class="status-indicator">❌</div>
                <div class="status-text">Status Indisponível</div>
                <div class="status-detail">${msg}</div>
                <div class="error-box">${msg}</div>
            `;
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return seconds + 's';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h';
            return Math.floor(seconds / 86400) + 'd';
        }

        // Carregar na inicialização
        loadStatus();
        // Atualizar a cada 10s
        setInterval(loadStatus, 10000);
    </script>
</body>
</html>
